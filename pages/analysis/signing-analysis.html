<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>签约分析 - 律所系统</title><link rel="stylesheet" href="../../assets/styles/main.css" /></head>
  <body data-page="signing-analysis">
    <div class="app-shell"><aside class="sidebar"></aside><div class="main-shell"><div class="workspace">
      <header class="topbar"><div><h1>签约分析</h1><p>聚焦合同成交、金额结构与回款兑现率。</p></div><div class="topbar-actions"><span class="ghost-chip">签约经营</span></div></header>
      <main class="page-body">
        <section class="metrics">
          <div class="metric"><div class="metric-label">本月签约数</div><div class="metric-value">17</div><div class="metric-note">同比 +5</div></div>
          <div class="metric"><div class="metric-label">签约金额</div><div class="metric-value">286万</div><div class="metric-note">平均客单 16.8 万</div></div>
          <div class="metric"><div class="metric-label">首期回款率</div><div class="metric-value">81%</div><div class="metric-note">签后 7 日观察</div></div>
        </section>
        <section class="panel">
          <div class="table-shell">
            <table>
              <thead><tr><th>团队</th><th>签约数量</th><th>签约金额</th><th>平均客单价</th><th>首期回款率</th></tr></thead>
              <tbody>
                <tr><td>民商事团队</td><td>6</td><td>118 万</td><td>19.7 万</td><td>83%</td></tr>
                <tr><td>刑事团队</td><td>5</td><td>92 万</td><td>18.4 万</td><td>79%</td></tr>
                <tr><td>家事团队</td><td>4</td><td>48 万</td><td>12 万</td><td>84%</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div></div></div>
    <script src="../../assets/scripts/app.js"></script>
  </body>
</html>
