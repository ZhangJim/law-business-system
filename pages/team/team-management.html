<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>团队管理 - 律所系统</title><link rel="stylesheet" href="../../assets/styles/main.css" /></head>
  <body data-page="team-management">
    <div class="app-shell"><aside class="sidebar"></aside><div class="main-shell"><div class="workspace">
      <main class="page-body compact"><div class="split-workspace">
        <section class="split-main"><section class="panel">
          <div class="toolbar"><div><button class="button" type="button">＋ 新增团队</button></div><div class="toolbar-tools"><span>组织架构</span><span>成员负载</span><span>协作分工</span></div></div>
          <div class="list">
            <div class="list-item"><div><div class="list-main"><a class="table-link" href="#">刑事团队</a></div><div class="list-sub">主任 1 人 | 执业律师 4 人 | 助理 2 人</div></div><div class="list-side">负载 76%</div></div>
            <div class="list-item"><div><div class="list-main">民商事团队</div><div class="list-sub">主任 1 人 | 执业律师 5 人 | 助理 3 人</div></div><div class="list-side">负载 68%</div></div>
            <div class="list-item"><div><div class="list-main">家事团队</div><div class="list-sub">主任 1 人 | 执业律师 3 人 | 助理 2 人</div></div><div class="list-side">负载 59%</div></div>
          </div>
        </section></section>
        <aside class="detail-pane" data-create-title="未命名团队">
          <div class="detail-topbar"><div class="detail-topbar-actions"><span>⌃</span><span>⌄</span></div><div class="detail-topbar-actions"><span>···</span><span>×</span></div></div>
          <div class="detail-scroll"><h2 class="detail-title">刑事团队</h2><div class="detail-tabs"><span class="detail-tab active">详情</span><span class="detail-tab">历史</span></div>
            <section class="detail-group" data-role="detail"><div class="detail-card">
              <div class="detail-field"><div class="detail-label">团队名称</div><div class="detail-value">刑事团队</div></div>
              <div class="detail-field"><div class="detail-label">成员结构</div><div class="detail-value">主任 1 人 | 执业律师 4 人 | 助理 2 人</div></div>
              <div class="detail-field"><div class="detail-label">当前负载</div><div class="detail-value">76%</div></div>
              <div class="detail-field"><div class="detail-label">负责人</div><div class="detail-value"><span class="person-chip"><span class="person-avatar">刘</span>刘律师</span></div></div>
            </div></section>
            <section class="detail-group" data-role="history"><div class="detail-card"><table class="history-table"><thead><tr><th>时间</th><th>字段</th><th>变更前</th><th></th><th>变更后</th></tr></thead><tbody><tr><td>04月18日</td><td>当前负载</td><td>70%</td><td class="history-arrow">→</td><td>76%</td></tr></tbody></table></div></section>
            <section class="detail-group" data-role="create"><div class="detail-card"><form class="drawer-form">
              <div class="drawer-form-grid"><div class="field"><label>团队名称</label><input class="input" value="请输入团队名称" /></div><div class="field"><label>负责人</label><input class="input" value="请选择人员" /></div></div>
              <div class="field"><label>团队说明</label><textarea class="textarea">请输入团队说明</textarea></div>
              <div class="detail-footer"><button class="button" type="button">提交</button><button class="button secondary" type="button">取消</button></div>
            </form></div></section>
          </div>
        </aside>
      </div></main>
    </div></div></div>
    <script src="../../assets/scripts/app.js"></script>
  </body>
</html>
